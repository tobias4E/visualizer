<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Charging Stations</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d1117; color: #e6edf3; height: 100dvh; overflow: hidden; }

    /* ── Setup screen ── */
    #setup { padding: 16px; height: 100dvh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    #setup h1 { font-size: 1.4rem; color: #58a6ff; margin-bottom: 4px; }
    #setup h1 span { font-size: 0.8rem; color: #8b949e; font-weight: 400; display: block; margin-top: 2px; }

    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #30363d; border-radius: 8px; background: #0d1117; color: #e6edf3; font-size: 16px; /* prevent iOS zoom */ outline: none; }
    input:focus { border-color: #58a6ff; }
    input::placeholder { color: #484f58; }

    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }

    .btn { padding: 11px 16px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .btn:active { opacity: 0.75; }
    .btn-add  { background: #21262d; color: #58a6ff; border: 1px solid #30363d; width: 100%; }
    .btn-start{ background: #1f6feb; color: #fff; width: 100%; font-size: 16px; margin-top: 4px; }
    .btn-start:disabled { background: #21262d; color: #484f58; cursor: default; }
    .btn-del  { background: transparent; color: #8b949e; border: none; font-size: 18px; padding: 4px 8px; cursor: pointer; line-height: 1; }
    .btn-del:active { color: #f85149; }

    .station-item { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
    .station-item .info { flex: 1; }
    .station-item .sname { font-weight: 600; font-size: 15px; }
    .station-item .scoords { font-size: 12px; color: #8b949e; margin-top: 2px; font-variant-numeric: tabular-nums; }

    #station-list { display: flex; flex-direction: column; gap: 6px; }
    .empty-hint { text-align: center; color: #484f58; font-size: 14px; padding: 20px 0; }

    /* ── AR screen ── */
    #ar { display: none; position: fixed; inset: 0; background: #000; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #overlay { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

    /* Marker */
    .marker {
      position: absolute;
      transform: translate(-50%, -100%);
      display: flex; flex-direction: column; align-items: center;
      transition: left 80ms linear, top 80ms linear;
      will-change: left, top;
    }
    .m-name {
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .m-dist {
      font-size: 11px;
      color: #58a6ff;
      font-weight: 600;
      margin-top: 2px;
    }
    .m-arrow {
      margin-top: 4px;
      width: 0; height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 22px solid #58a6ff;
      filter: drop-shadow(0 0 8px rgba(88,166,255,0.9));
      animation: jump 0.55s ease-in-out infinite alternate;
    }
    @keyframes jump {
      from { transform: translateY(0px); }
      to   { transform: translateY(-14px); }
    }

    /* HUD */
    #hud-back {
      position: absolute; top: 16px; left: 16px;
      background: rgba(0,0,0,0.65); border: none; color: #e6edf3;
      padding: 8px 14px; border-radius: 20px; font-size: 14px; cursor: pointer;
      pointer-events: all; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 20;
    }
    #hud-compass {
      position: absolute; top: 16px; right: 16px;
      background: rgba(0,0,0,0.65); color: #58a6ff;
      padding: 8px 12px; border-radius: 20px; font-size: 13px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #hud-status {
      position: absolute; bottom: 20px; left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,0.6);
      font-size: 12px; pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }
    #hud-flip {
      position: absolute; top: 58px; right: 16px;
      background: rgba(0,0,0,0.65); border: 1px solid rgba(88,166,255,0.4);
      color: #58a6ff; padding: 6px 12px; border-radius: 20px; font-size: 12px;
      cursor: pointer; pointer-events: all;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #hud-debug-btn {
      position: absolute; top: 100px; right: 16px;
      background: rgba(0,0,0,0.65); border: 1px solid rgba(255,200,0,0.4);
      color: #ffc800; padding: 6px 12px; border-radius: 20px; font-size: 12px;
      cursor: pointer; pointer-events: all;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #debug-panel {
      display: none;
      position: absolute; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.85);
      color: #ffc800; font-size: 11px; font-family: monospace;
      padding: 10px 12px; line-height: 1.7;
      pointer-events: none;
      white-space: pre;
      max-height: 55vh; overflow-y: auto;
    }

    #hud-cv {
      position: absolute; bottom: 44px; left: 0; right: 0;
      text-align: center; font-size: 11px; pointer-events: none;
      color: rgba(255,200,0,0.85);
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }
    /* Arrow turns green when CV has locked onto a detected object */
    .marker.cv-locked .m-arrow {
      border-top-color: #2ecc71;
      filter: drop-shadow(0 0 8px rgba(46,204,113,0.9));
    }
    .marker.cv-locked .m-name {
      border: 1px solid rgba(46,204,113,0.7);
    }

    /* Off-screen edge arrows */
    .edge-indicator {
      position: absolute; top: 50%; transform: translateY(-50%);
      color: #58a6ff; font-size: 28px; opacity: 0.8;
      text-shadow: 0 0 8px rgba(88,166,255,0.7);
      animation: pulse 1s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .edge-left  { left: 10px; }
    .edge-right { right: 10px; }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 0.9; } }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     Setup Screen
══════════════════════════════════════════ -->
<div id="setup">
  <h1>⚡ AR Charging Stations
    <span>Enter stations, then press Start AR.</span>
  </h1>

  <div class="card">
    <label>Station Name</label>
    <input id="inp-name" placeholder="e.g. Tesla Supercharger A1" type="text" enterkeyhint="next">

    <label>Coordinates (WGS84)</label>
    <div class="row">
      <input id="inp-lat" placeholder="Latitude" type="number" step="any" enterkeyhint="next">
      <input id="inp-lon" placeholder="Longitude" type="number" step="any" enterkeyhint="next">
    </div>

    <label>Height above ground (m) — optional, e.g. 1.0 for a charging post top</label>
    <input id="inp-height" placeholder="Height in m (default 1.0)" type="number" step="0.1" min="0" max="50" enterkeyhint="done">

    <button class="btn btn-add" onclick="addStation()">+ Add Station</button>
  </div>

  <div id="station-list"></div>

  <button class="btn btn-start" id="btn-start" onclick="startAR()" disabled>▶ Start AR</button>
</div>

<!-- ══════════════════════════════════════════
     AR Screen
══════════════════════════════════════════ -->
<div id="ar">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay"></div>
  <!-- Hidden canvas used for running TF.js inference on the camera frame -->
  <canvas id="inf-canvas" style="display:none"></canvas>
  <button id="hud-back" onclick="stopAR()">← Back</button>
  <div id="hud-compass">↑ ---°</div>
  <button id="hud-flip" onclick="flipCompass()">↔ Flip compass</button>
  <button id="hud-debug-btn" onclick="toggleDebug()">🔍 Debug</button>
  <div id="debug-panel"></div>
  <div id="hud-cv"></div>
  <div id="hud-status">Acquiring GPS…</div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let stations = JSON.parse(localStorage.getItem('stations') || '[]');
let userPos  = null;
let rawHeading    = 0;  // latest compass reading (CW from north)
let smoothHeading = 0;  // exponentially smoothed heading used for rendering
let rawPitch    = 0;    // latest tilt reading:  0 = pointing at horizon, + = looking down
let smoothPitch = 0;    // exponentially smoothed pitch used for rendering
let stream   = null;
let watchId  = null;
let rafId    = null;
let hasAbsoluteHeading = false; // true once we receive a reliable compass event
let firstHeading = true;        // snap smoothHeading on the very first reading
// Some Android devices report alpha CW-from-North; others report it CCW (per spec).
// "Flip compass" toggles between the two. Preference is saved across sessions.
let alphaFlipped = localStorage.getItem('compassFlip') === '1';

// Debug state — updated on every orientation event for display
let dbg = {
  source:    'none',   // which event last fired
  rawAlpha:  null,     // alpha straight from the event
  rawBeta:   null,     // beta straight from the event
  eventCount: 0,       // total orientation events received
  absCount:   0,       // deviceorientationabsolute count
  fallCount:  0,       // deviceorientation count
};
let debugVisible = false;

// ── CV / TensorFlow.js state ───────────────────────────────────────────────
let tfModel     = null;   // loaded TF.js model (kept alive across AR sessions)
let cvActive    = false;  // detection loop running flag
// Map<stationId, {sx, sy, score, label} | null>
// sx/sy = screen-space pixel coords of the best-matching detection
const cvDetections = new Map();

// Inference canvas dimensions — portrait 3:4 at reduced res for speed
const INF_W = 320;

const HFOV = 80;  // horizontal field of view (degrees) — wider margin for compass error
const VFOV = 60;  // vertical field of view (degrees) — portrait mode

// ── Helpers ────────────────────────────────────────────────────────────────
const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;

function getBearing(from, to) {
  const φ1 = toRad(from.lat), φ2 = toRad(to.lat);
  const Δλ = toRad(to.lon - from.lon);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function getDistance(from, to) {
  const R = 6371000;
  const dφ = toRad(to.lat - from.lat);
  const dλ = toRad(to.lon - from.lon);
  const a  = Math.sin(dφ/2)**2 + Math.cos(toRad(from.lat)) * Math.cos(toRad(to.lat)) * Math.sin(dλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(m) {
  return m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;
}

// ── Setup screen ───────────────────────────────────────────────────────────
function saveStations() {
  localStorage.setItem('stations', JSON.stringify(stations));
}

function addStation() {
  const name   = document.getElementById('inp-name').value.trim();
  const lat    = parseFloat(document.getElementById('inp-lat').value);
  const lon    = parseFloat(document.getElementById('inp-lon').value);
  const hRaw   = parseFloat(document.getElementById('inp-height').value);
  const height = isNaN(hRaw) ? 1.0 : Math.max(0, hRaw); // default 1.0 m

  if (!name)                               return alert('Please enter a station name.');
  if (isNaN(lat) || lat < -90 || lat > 90)   return alert('Latitude must be between −90 and 90.');
  if (isNaN(lon) || lon < -180 || lon > 180) return alert('Longitude must be between −180 and 180.');

  stations.push({ id: Date.now(), name, lat, lon, height });
  saveStations();
  document.getElementById('inp-name').value   = '';
  document.getElementById('inp-lat').value    = '';
  document.getElementById('inp-lon').value    = '';
  document.getElementById('inp-height').value = '';
  document.getElementById('inp-name').focus();
  renderList();
}

function removeStation(id) {
  stations = stations.filter(s => s.id !== id);
  saveStations();
  renderList();
}

function renderList() {
  const list = document.getElementById('station-list');
  if (stations.length === 0) {
    list.innerHTML = '<p class="empty-hint">No stations yet — add one above.</p>';
  } else {
    list.innerHTML = stations.map(s => `
      <div class="station-item">
        <div class="info">
          <div class="sname">${escHtml(s.name)}</div>
          <div class="scoords">${s.lat.toFixed(6)}, ${s.lon.toFixed(6)} · ${(s.height ?? 1.0).toFixed(1)} m</div>
        </div>
        <button class="btn-del" onclick="removeStation(${s.id})" title="Remove">✕</button>
      </div>
    `).join('');
  }
  document.getElementById('btn-start').disabled = stations.length === 0;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Allow pressing Enter in the last field to add
document.getElementById('inp-lon').addEventListener('keydown', e => {
  if (e.key === 'Enter') addStation();
});

// ── AR: start / stop ───────────────────────────────────────────────────────
async function startAR() {
  // iOS 13+ requires a user-gesture to unlock DeviceOrientation
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') {
        alert('Motion & Orientation permission denied.\nAR rotation tracking won\'t work.');
      }
    } catch(e) { console.warn('DeviceOrientation permission error', e); }
  }

  // Camera
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    return alert('Camera access denied.\n\nMake sure this page is served over HTTPS (or localhost) and camera permission is granted.\n\nError: ' + e.message);
  }

  // Geolocation
  if (!navigator.geolocation) return alert('Geolocation not supported.');
  watchId = navigator.geolocation.watchPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      // Show GPS accuracy in the compass pill; render loop owns the status bar.
      document.getElementById('hud-compass').dataset.gps = `±${Math.round(pos.coords.accuracy)}m`;
    },
    err => {
      document.getElementById('hud-status').textContent = 'GPS error: ' + err.message;
    },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
  );

  // Orientation events
  hasAbsoluteHeading = false;
  window.addEventListener('deviceorientationabsolute', onOrientationAbsolute, true);
  window.addEventListener('deviceorientation',         onOrientationFallback,  true);

  // Build marker DOM
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = '';
  stations.forEach(s => {
    const el = document.createElement('div');
    el.className = 'marker';
    el.id = `m-${s.id}`;
    el.innerHTML = `
      <div class="m-name">${escHtml(s.name)}</div>
      <div class="m-dist" id="md-${s.id}"></div>
      <div class="m-arrow"></div>
    `;
    el.style.display = 'none';
    overlay.appendChild(el);
  });

  document.getElementById('setup').style.display = 'none';
  document.getElementById('ar').style.display    = 'block';

  rafId = requestAnimationFrame(renderLoop);

  // Load TF model asynchronously — AR is already usable (GPS mode) while this runs.
  // The model is kept in memory across sessions so it only loads once.
  cvActive = true;
  if (tfModel) {
    // Already loaded from a previous session
    document.getElementById('hud-cv').textContent = 'CV: ready';
    runDetectionLoop();
  } else {
    document.getElementById('hud-cv').textContent = 'CV: loading model…';
    ort.InferenceSession.create('./model/best.onnx', { executionProviders: ['wasm'] })
      .then(session => {
        tfModel = makeOrtWrapper(session, ['charger']);
        document.getElementById('hud-cv').textContent = 'CV: model ready';
        if (cvActive) runDetectionLoop();
      })
      .catch(err => {
        document.getElementById('hud-cv').textContent = 'CV: failed to load';
        console.warn('ONNX model load failed:', err);
      });
  }
}

function stopAR() {
  if (rafId)    cancelAnimationFrame(rafId);
  if (stream)   stream.getTracks().forEach(t => t.stop());
  if (watchId != null) navigator.geolocation.clearWatch(watchId);
  window.removeEventListener('deviceorientationabsolute', onOrientationAbsolute, true);
  window.removeEventListener('deviceorientation',         onOrientationFallback,  true);
  stream = null; watchId = null; rafId = null; userPos = null;
  hasAbsoluteHeading = false; firstHeading = true;
  cvActive = false;
  cvDetections.clear();
  document.getElementById('hud-cv').textContent = '';
  document.getElementById('ar').style.display    = 'none';
  document.getElementById('setup').style.display = 'flex';
}

// ── Orientation ────────────────────────────────────────────────────────────
function setHeadingFromAlpha(alpha) {
  rawHeading = alphaFlipped ? (360 - alpha) % 360 : alpha;
  if (firstHeading) { smoothHeading = rawHeading; firstHeading = false; }
  hasAbsoluteHeading = true;
}

function flipCompass() {
  alphaFlipped = !alphaFlipped;
  localStorage.setItem('compassFlip', alphaFlipped ? '1' : '0');
  smoothHeading = rawHeading; // snap immediately so the user sees the effect
}

function toggleDebug() {
  debugVisible = !debugVisible;
  document.getElementById('debug-panel').style.display = debugVisible ? 'block' : 'none';
}

function onOrientationAbsolute(e) {
  dbg.absCount++;
  dbg.eventCount++;
  dbg.source   = 'deviceorientationabsolute';
  dbg.rawAlpha = e.alpha;
  dbg.rawBeta  = e.beta;
  if (e.beta  != null) rawPitch = e.beta - 90; // 0 = pointing at horizon, + = tilted down
  if (e.alpha != null) setHeadingFromAlpha(e.alpha);
}

function onOrientationFallback(e) {
  dbg.fallCount++;
  dbg.eventCount++;
  dbg.rawBeta = e.beta;
  if (e.beta != null) rawPitch = e.beta - 90;

  if (e.webkitCompassHeading != null) {
    dbg.source   = 'deviceorientation[webkitCompassHeading]';
    dbg.rawAlpha = e.webkitCompassHeading;
    rawHeading = e.webkitCompassHeading;
    if (firstHeading) { smoothHeading = rawHeading; firstHeading = false; }
    hasAbsoluteHeading = true;
  } else if (e.absolute && e.alpha != null) {
    dbg.source   = 'deviceorientation[absolute=true]';
    dbg.rawAlpha = e.alpha;
    setHeadingFromAlpha(e.alpha);
  } else {
    // Non-absolute — records event count but doesn't update heading.
    dbg.source   = `deviceorientation[absolute=${e.absolute}, alpha=${e.alpha != null}]`;
    dbg.rawAlpha = e.alpha;
  }
}

// ── CV detection loop ──────────────────────────────────────────────────────
async function runDetectionLoop() {
  if (!cvActive) return;

  const video  = document.getElementById('video');
  const canvas = document.getElementById('inf-canvas');
  const ctx    = canvas.getContext('2d');

  // Wait until video has real dimensions (might not be ready immediately)
  if (!video.videoWidth) {
    setTimeout(runDetectionLoop, 500);
    return;
  }

  // Size the inference canvas to match screen aspect ratio at low resolution.
  // This replicates object-fit:cover so prediction coords map directly to screen %.
  const W = window.innerWidth, H = window.innerHeight;
  const INF_H = Math.round(INF_W * H / W);
  if (canvas.width !== INF_W || canvas.height !== INF_H) {
    canvas.width = INF_W; canvas.height = INF_H;
  }

  // Draw only the visible crop of the video (mirrors CSS object-fit:cover).
  const vW = video.videoWidth, vH = video.videoHeight;
  const screenAR = W / H, videoAR = vW / vH;
  let sx, sy, sw, sh;
  if (videoAR > screenAR) {
    sh = vH; sw = sh * screenAR; sx = (vW - sw) / 2; sy = 0;
  } else {
    sw = vW; sh = sw / screenAR; sx = 0; sy = (vH - sh) / 2;
  }
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, INF_W, INF_H);

  let preds = [];
  try {
    preds = await tfModel.detect(canvas);
  } catch (e) {
    console.warn('TF detect error:', e);
    setTimeout(runDetectionLoop, 1000);
    return;
  }

  // Scale bounding boxes from inference canvas space → screen pixels
  const scaled = preds
    .filter(p => p.score >= 0.25)
    .map(p => ({
      label : p.class,
      score : p.score,
      sx    : ((p.bbox[0] + p.bbox[2] / 2) / INF_W) * W,  // center x
      sy    : ((p.bbox[1] + p.bbox[3] / 2) / INF_H) * H,  // center y
    }));

  // For each in-view station, snap to the closest detection within a generous
  // threshold (GPS ±15 m error translates to ~40% of screen at 30 m range).
  const snapPx = Math.min(W, H) * 0.45;
  stations.forEach(s => {
    const marker = document.getElementById(`m-${s.id}`);
    if (!marker || marker.style.display === 'none') {
      cvDetections.set(s.id, null);
      return;
    }
    const gpsX = parseFloat(marker.style.left)  / 100 * W;
    const gpsY = parseFloat(marker.style.top)   / 100 * H;

    let best = null, bestDist = snapPx;
    scaled.forEach(p => {
      const d = Math.hypot(p.sx - gpsX, p.sy - gpsY);
      if (d < bestDist) { bestDist = d; best = p; }
    });
    cvDetections.set(s.id, best);
  });

  // Update CV status pill
  const locked = [...cvDetections.values()].filter(Boolean).length;
  const cvEl = document.getElementById('hud-cv');
  if (scaled.length === 0) {
    cvEl.textContent = 'CV: scanning…';
  } else {
    cvEl.textContent = locked
      ? `CV: locked (${scaled.length} obj, ${locked} matched)`
      : `CV: ${scaled.length} obj — none near GPS pos`;
  }

  // ~3 FPS — enough to track a slowly moving user without draining the battery
  setTimeout(runDetectionLoop, 333);
}

// ── Render loop ────────────────────────────────────────────────────────────
function renderLoop() {
  rafId = requestAnimationFrame(renderLoop);
  if (!userPos) return;

  // Smooth heading (circular EMA). Pitch is tracked but not used for rendering.
  let diff = rawHeading - smoothHeading;
  if (diff >  180) diff -= 360;
  if (diff < -180) diff += 360;
  smoothHeading = (smoothHeading + diff * 0.15 + 360) % 360;
  smoothPitch   = smoothPitch + (rawPitch - smoothPitch) * 0.1; // kept for debug only

  const compassEl = document.getElementById('hud-compass');
  const gpsTag = compassEl.dataset.gps ? ` GPS${compassEl.dataset.gps}` : '';
  compassEl.textContent = hasAbsoluteHeading
    ? `↑ ${Math.round(smoothHeading)}°${gpsTag}`
    : `↑ No compass${gpsTag}`;

  let inRangeCount = 0;
  const stationDebugLines = [];

  stations.forEach(s => {
    const marker  = document.getElementById(`m-${s.id}`);
    const distEl  = document.getElementById(`md-${s.id}`);
    const edgeId  = `edge-${s.id}`;
    let   edgeEl  = document.getElementById(edgeId);
    if (!marker) return;

    const dist = getDistance(userPos, s);

    // Only show stations within 100 m
    if (dist > 100) {
      marker.style.display = 'none';
      if (edgeEl) edgeEl.style.display = 'none';
      stationDebugLines.push(`  "${s.name}": ${Math.round(dist)}m — OUT OF RANGE`);
      return;
    }
    inRangeCount++;

    const bearing = getBearing(userPos, s);

    // Horizontal: bearing relative to smoothed device heading (−180 to +180)
    const relH = ((bearing - smoothHeading + 540) % 360) - 180;

    // Vertical: place the arrow at the geometrically correct elevation angle for this
    // distance and height, but deliberately ignore device pitch (tilt sensor).
    // Reason: pitch from the gyro is noisy and inconsistent across devices, causing the
    // arrow to wobble when the hand trembles. For a ground-level target the correct
    // elevation is always close to the horizon; basing Y on distance alone is stable
    // and accurate enough for practical use.
    const EYE_HEIGHT = 1.6;
    const stationH   = s.height ?? 1.0;
    const heightDiff = EYE_HEIGHT - stationH; // positive = station is below eye
    const elevAngle  = -toDeg(Math.atan2(heightDiff, Math.max(dist, 0.5)));
    // Map elevation angle to screen Y with a fixed reference VFOV (no pitch term).
    // yPct 50 = horizon, >50 = below horizon (lower on screen).
    const relV = elevAngle; // no smoothPitch — vertical is world-geometry only

    const xPct = 50 + (relH / (HFOV / 2)) * 50;
    const yPct = 50 - (relV / (VFOV / 2)) * 50;

    const inView = Math.abs(relH) < HFOV / 2;

    const visLabel = inView ? 'VISIBLE' : (relH < 0 ? 'LEFT' : 'RIGHT');
    const EYE_HEIGHT2 = 1.6;
    const elev = -toDeg(Math.atan2(EYE_HEIGHT2 - (s.height ?? 1.0), Math.max(dist, 0.5)));
    stationDebugLines.push(
      `  "${s.name}": dist=${Math.round(dist)}m bear=${Math.round(bearing)}° relH=${relH > 0 ? '+' : ''}${Math.round(relH)}° elev=${elev.toFixed(1)}° h=${(s.height ?? 1.0).toFixed(1)}m → ${visLabel}`
    );

    // Always write GPS-projected position so runDetectionLoop can match YOLO detections
    marker.style.left = `${xPct}%`;
    marker.style.top  = `${Math.max(8, Math.min(88, yPct))}%`;

    const cvDet = cvDetections.get(s.id);
    if (cvDet) {
      // YOLO confirmed: show arrow snapped to detection box
      marker.style.display = 'flex';
      marker.style.left = `${(cvDet.sx / window.innerWidth)  * 100}%`;
      marker.style.top  = `${(cvDet.sy / window.innerHeight) * 100}%`;
      distEl.textContent = `${fmtDist(dist)} · ${Math.round(cvDet.score * 100)}%`;
      marker.classList.add('cv-locked');
      if (edgeEl) edgeEl.style.display = 'none';
    } else {
      // No YOLO detection: hide arrow
      marker.style.display = 'none';
      marker.classList.remove('cv-locked');
      // Edge indicator: GPS-driven so user knows where to point the camera
      if (!inView) {
        if (!edgeEl) {
          edgeEl = document.createElement('div');
          edgeEl.id = edgeId;
          document.getElementById('overlay').appendChild(edgeEl);
        }
        edgeEl.className   = 'edge-indicator ' + (relH < 0 ? 'edge-left' : 'edge-right');
        edgeEl.textContent = relH < 0 ? '‹' : '›';
        edgeEl.style.display = 'block';
      } else {
        if (edgeEl) edgeEl.style.display = 'none';
      }
    }
  });

  // Debug panel
  if (debugVisible) {
    const gps = userPos
      ? `${userPos.lat.toFixed(6)}, ${userPos.lon.toFixed(6)}`
      : 'waiting…';
    const gpsAcc = document.getElementById('hud-compass').dataset.gps || '?';
    document.getElementById('debug-panel').textContent =
`── SENSOR SOURCE ──────────────────────────
source   : ${dbg.source}
events   : total=${dbg.eventCount}  abs=${dbg.absCount}  fallback=${dbg.fallCount}
rawAlpha : ${dbg.rawAlpha != null ? dbg.rawAlpha.toFixed(2) + '°' : 'null'}
rawBeta  : ${dbg.rawBeta  != null ? dbg.rawBeta.toFixed(2)  + '°' : 'null'}
flip     : ${alphaFlipped ? 'ON (using 360−alpha)' : 'OFF (using alpha directly)'}
hasAbs   : ${hasAbsoluteHeading}

── HEADING ────────────────────────────────
rawHeading    : ${rawHeading.toFixed(1)}°
smoothHeading : ${smoothHeading.toFixed(1)}°
rawPitch      : ${rawPitch.toFixed(1)}°   (0=horizon +tilted-down)
smoothPitch   : ${smoothPitch.toFixed(1)}°

── GPS ────────────────────────────────────
position : ${gps}
accuracy : ${gpsAcc}

── STATIONS (FOV ±${HFOV/2}°) ─────────────
${stationDebugLines.join('\n') || '  (none in range)'}`;
  }

  // Status line
  const detectedCount = [...cvDetections.values()].filter(Boolean).length;
  const statusEl = document.getElementById('hud-status');
  if (!hasAbsoluteHeading) {
    statusEl.textContent = 'No compass — wave phone in a figure-8 to calibrate';
  } else if (inRangeCount === 0) {
    statusEl.textContent = 'No stations within 100 m';
  } else if (detectedCount > 0) {
    statusEl.textContent = `${detectedCount} charger${detectedCount > 1 ? 's' : ''} detected`;
  } else {
    statusEl.textContent = `${inRangeCount} station${inRangeCount > 1 ? 's' : ''} in range — point camera at charger`;
  }
}

// ── YOLOv8 ONNX wrapper (onnxruntime-web) ─────────────────────────────────
function makeOrtWrapper(session, classNames) {
  return {
    async detect(canvas) {
      const SIZE = 320;

      // Resize canvas to 320×320 and extract RGB pixels in CHW float32 format
      const tmp = document.createElement('canvas');
      tmp.width = SIZE; tmp.height = SIZE;
      tmp.getContext('2d').drawImage(canvas, 0, 0, SIZE, SIZE);
      const px = tmp.getContext('2d').getImageData(0, 0, SIZE, SIZE).data;
      const input = new Float32Array(3 * SIZE * SIZE);
      for (let i = 0; i < SIZE * SIZE; i++) {
        input[i]               = px[i * 4]     / 255.0; // R
        input[i + SIZE * SIZE]   = px[i * 4 + 1] / 255.0; // G
        input[i + 2 * SIZE * SIZE] = px[i * 4 + 2] / 255.0; // B
      }

      const tensor  = new ort.Tensor('float32', input, [1, 3, SIZE, SIZE]);
      const results = await session.run({ images: tensor });
      // output0 shape: [1, 4+nc, numAnchors] — for nc=1 at 320px: [1, 5, 2100]
      const data    = results['output0'].data;
      const numDet  = results['output0'].dims[2];

      const boxes = [];
      for (let i = 0; i < numDet; i++) {
        let maxConf = 0, maxCls = 0;
        for (let c = 0; c < classNames.length; c++) {
          const conf = data[(4 + c) * numDet + i];
          if (conf > maxConf) { maxConf = conf; maxCls = c; }
        }
        if (maxConf < 0.25) continue;
        const cx = data[0 * numDet + i] / SIZE * canvas.width;
        const cy = data[1 * numDet + i] / SIZE * canvas.height;
        const bw = data[2 * numDet + i] / SIZE * canvas.width;
        const bh = data[3 * numDet + i] / SIZE * canvas.height;
        boxes.push({ class: classNames[maxCls], score: maxConf, bbox: [cx - bw / 2, cy - bh / 2, bw, bh] });
      }
      return nms(boxes, 0.45);
    }
  };
}

function nms(boxes, iouThreshold) {
  boxes.sort((a, b) => b.score - a.score);
  const kept = [], suppressed = new Set();
  for (let i = 0; i < boxes.length; i++) {
    if (suppressed.has(i)) continue;
    kept.push(boxes[i]);
    for (let j = i + 1; j < boxes.length; j++) {
      if (iou(boxes[i].bbox, boxes[j].bbox) > iouThreshold) suppressed.add(j);
    }
  }
  return kept;
}

function iou([x1,y1,w1,h1], [x2,y2,w2,h2]) {
  const ix = Math.max(0, Math.min(x1+w1, x2+w2) - Math.max(x1, x2));
  const iy = Math.max(0, Math.min(y1+h1, y2+h2) - Math.max(y1, y2));
  const inter = ix * iy;
  return inter / (w1*h1 + w2*h2 - inter + 1e-6);
}

// ── Init ───────────────────────────────────────────────────────────────────
renderList();
</script>
