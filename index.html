<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Charging Stations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d1117; color: #e6edf3; height: 100dvh; overflow: hidden; }

    /* ── Setup screen ── */
    #setup { padding: 16px; height: 100dvh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    #setup h1 { font-size: 1.4rem; color: #58a6ff; margin-bottom: 4px; }
    #setup h1 span { font-size: 0.8rem; color: #8b949e; font-weight: 400; display: block; margin-top: 2px; }

    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #30363d; border-radius: 8px; background: #0d1117; color: #e6edf3; font-size: 16px; /* prevent iOS zoom */ outline: none; }
    input:focus { border-color: #58a6ff; }
    input::placeholder { color: #484f58; }

    .row { display: flex; gap: 8px; }
    .row input { flex: 1; }

    .btn { padding: 11px 16px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    .btn:active { opacity: 0.75; }
    .btn-add  { background: #21262d; color: #58a6ff; border: 1px solid #30363d; width: 100%; }
    .btn-start{ background: #1f6feb; color: #fff; width: 100%; font-size: 16px; margin-top: 4px; }
    .btn-start:disabled { background: #21262d; color: #484f58; cursor: default; }
    .btn-del  { background: transparent; color: #8b949e; border: none; font-size: 18px; padding: 4px 8px; cursor: pointer; line-height: 1; }
    .btn-del:active { color: #f85149; }

    .station-item { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
    .station-item .info { flex: 1; }
    .station-item .sname { font-weight: 600; font-size: 15px; }
    .station-item .scoords { font-size: 12px; color: #8b949e; margin-top: 2px; font-variant-numeric: tabular-nums; }

    #station-list { display: flex; flex-direction: column; gap: 6px; }
    .empty-hint { text-align: center; color: #484f58; font-size: 14px; padding: 20px 0; }

    /* ── AR screen ── */
    #ar { display: none; position: fixed; inset: 0; background: #000; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #overlay { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

    /* Marker */
    .marker {
      position: absolute;
      transform: translate(-50%, -100%);
      display: flex; flex-direction: column; align-items: center;
      transition: left 80ms linear, top 80ms linear;
      will-change: left, top;
    }
    .m-name {
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .m-dist {
      font-size: 11px;
      color: #58a6ff;
      font-weight: 600;
      margin-top: 2px;
    }
    .m-arrow {
      margin-top: 4px;
      width: 0; height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 22px solid #58a6ff;
      filter: drop-shadow(0 0 8px rgba(88,166,255,0.9));
      animation: jump 0.55s ease-in-out infinite alternate;
    }
    @keyframes jump {
      from { transform: translateY(0px); }
      to   { transform: translateY(-14px); }
    }

    /* HUD */
    #hud-back {
      position: absolute; top: 16px; left: 16px;
      background: rgba(0,0,0,0.65); border: none; color: #e6edf3;
      padding: 8px 14px; border-radius: 20px; font-size: 14px; cursor: pointer;
      pointer-events: all; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 20;
    }
    #hud-compass {
      position: absolute; top: 16px; right: 16px;
      background: rgba(0,0,0,0.65); color: #58a6ff;
      padding: 8px 12px; border-radius: 20px; font-size: 13px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #hud-status {
      position: absolute; bottom: 20px; left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,0.6);
      font-size: 12px; pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    }

    /* Off-screen edge arrows */
    .edge-indicator {
      position: absolute; top: 50%; transform: translateY(-50%);
      color: #58a6ff; font-size: 28px; opacity: 0.8;
      text-shadow: 0 0 8px rgba(88,166,255,0.7);
      animation: pulse 1s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .edge-left  { left: 10px; }
    .edge-right { right: 10px; }
    @keyframes pulse { from { opacity: 0.4; } to { opacity: 0.9; } }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     Setup Screen
══════════════════════════════════════════ -->
<div id="setup">
  <h1>⚡ AR Charging Stations
    <span>Enter stations, then press Start AR.</span>
  </h1>

  <div class="card">
    <label>Station Name</label>
    <input id="inp-name" placeholder="e.g. Tesla Supercharger A1" type="text" enterkeyhint="next">

    <label>Coordinates (WGS84)</label>
    <div class="row">
      <input id="inp-lat" placeholder="Latitude" type="number" step="any" enterkeyhint="next">
      <input id="inp-lon" placeholder="Longitude" type="number" step="any" enterkeyhint="done">
    </div>

    <button class="btn btn-add" onclick="addStation()">+ Add Station</button>
  </div>

  <div id="station-list"></div>

  <button class="btn btn-start" id="btn-start" onclick="startAR()" disabled>▶ Start AR</button>
</div>

<!-- ══════════════════════════════════════════
     AR Screen
══════════════════════════════════════════ -->
<div id="ar">
  <video id="video" autoplay playsinline muted></video>
  <div id="overlay"></div>
  <button id="hud-back" onclick="stopAR()">← Back</button>
  <div id="hud-compass">↑ ---°</div>
  <div id="hud-status">Acquiring GPS…</div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let stations = JSON.parse(localStorage.getItem('stations') || '[]');
let userPos  = null;
let heading  = 0;   // compass bearing, degrees clockwise from north
let pitch    = 0;   // device tilt: 0 = pointing at horizon, + = looking down
let stream   = null;
let watchId  = null;
let rafId    = null;
let useAbsoluteOrientation = false;

const HFOV = 62;  // horizontal field of view (degrees) — typical wide-angle phone camera
const VFOV = 48;  // vertical field of view (degrees) — portrait mode

// ── Helpers ────────────────────────────────────────────────────────────────
const toRad = d => d * Math.PI / 180;
const toDeg = r => r * 180 / Math.PI;

function getBearing(from, to) {
  const φ1 = toRad(from.lat), φ2 = toRad(to.lat);
  const Δλ = toRad(to.lon - from.lon);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function getDistance(from, to) {
  const R = 6371000;
  const dφ = toRad(to.lat - from.lat);
  const dλ = toRad(to.lon - from.lon);
  const a  = Math.sin(dφ/2)**2 + Math.cos(toRad(from.lat)) * Math.cos(toRad(to.lat)) * Math.sin(dλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(m) {
  return m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;
}

// ── Setup screen ───────────────────────────────────────────────────────────
function saveStations() {
  localStorage.setItem('stations', JSON.stringify(stations));
}

function addStation() {
  const name = document.getElementById('inp-name').value.trim();
  const lat  = parseFloat(document.getElementById('inp-lat').value);
  const lon  = parseFloat(document.getElementById('inp-lon').value);

  if (!name)                              return alert('Please enter a station name.');
  if (isNaN(lat) || lat < -90 || lat > 90)  return alert('Latitude must be between −90 and 90.');
  if (isNaN(lon) || lon < -180 || lon > 180) return alert('Longitude must be between −180 and 180.');

  stations.push({ id: Date.now(), name, lat, lon });
  saveStations();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-lat').value  = '';
  document.getElementById('inp-lon').value  = '';
  document.getElementById('inp-name').focus();
  renderList();
}

function removeStation(id) {
  stations = stations.filter(s => s.id !== id);
  saveStations();
  renderList();
}

function renderList() {
  const list = document.getElementById('station-list');
  if (stations.length === 0) {
    list.innerHTML = '<p class="empty-hint">No stations yet — add one above.</p>';
  } else {
    list.innerHTML = stations.map(s => `
      <div class="station-item">
        <div class="info">
          <div class="sname">${escHtml(s.name)}</div>
          <div class="scoords">${s.lat.toFixed(6)}, ${s.lon.toFixed(6)}</div>
        </div>
        <button class="btn-del" onclick="removeStation(${s.id})" title="Remove">✕</button>
      </div>
    `).join('');
  }
  document.getElementById('btn-start').disabled = stations.length === 0;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Allow pressing Enter in the last field to add
document.getElementById('inp-lon').addEventListener('keydown', e => {
  if (e.key === 'Enter') addStation();
});

// ── AR: start / stop ───────────────────────────────────────────────────────
async function startAR() {
  // iOS 13+ requires a user-gesture to unlock DeviceOrientation
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') {
        alert('Motion & Orientation permission denied.\nAR rotation tracking won\'t work.');
      }
    } catch(e) { console.warn('DeviceOrientation permission error', e); }
  }

  // Camera
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    return alert('Camera access denied.\n\nMake sure this page is served over HTTPS (or localhost) and camera permission is granted.\n\nError: ' + e.message);
  }

  // Geolocation
  if (!navigator.geolocation) return alert('Geolocation not supported.');
  watchId = navigator.geolocation.watchPosition(
    pos => {
      userPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      document.getElementById('hud-status').textContent =
        `GPS ±${Math.round(pos.coords.accuracy)}m`;
    },
    err => {
      document.getElementById('hud-status').textContent = 'GPS error: ' + err.message;
    },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
  );

  // Orientation events
  useAbsoluteOrientation = false;
  window.addEventListener('deviceorientationabsolute', onOrientationAbsolute, true);
  window.addEventListener('deviceorientation',         onOrientationFallback,  true);

  // Build marker DOM
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = '';
  stations.forEach(s => {
    const el = document.createElement('div');
    el.className = 'marker';
    el.id = `m-${s.id}`;
    el.innerHTML = `
      <div class="m-name">${escHtml(s.name)}</div>
      <div class="m-dist" id="md-${s.id}"></div>
      <div class="m-arrow"></div>
    `;
    el.style.display = 'none';
    overlay.appendChild(el);
  });

  document.getElementById('setup').style.display = 'none';
  document.getElementById('ar').style.display    = 'block';

  rafId = requestAnimationFrame(renderLoop);
}

function stopAR() {
  if (rafId)    cancelAnimationFrame(rafId);
  if (stream)   stream.getTracks().forEach(t => t.stop());
  if (watchId != null) navigator.geolocation.clearWatch(watchId);
  window.removeEventListener('deviceorientationabsolute', onOrientationAbsolute, true);
  window.removeEventListener('deviceorientation',         onOrientationFallback,  true);
  stream = null; watchId = null; rafId = null; userPos = null;
  useAbsoluteOrientation = false;
  document.getElementById('ar').style.display    = 'none';
  document.getElementById('setup').style.display = 'flex';
}

// ── Orientation ────────────────────────────────────────────────────────────
function onOrientationAbsolute(e) {
  // Chrome on Android fires deviceorientationabsolute with an absolute compass.
  // alpha = CCW rotation around Z from north  →  heading = (360 − alpha) % 360
  if (e.alpha == null) return;
  useAbsoluteOrientation = true;
  heading = (360 - e.alpha) % 360;
  if (e.beta != null) pitch = e.beta - 90; // 0 = horizontal, + = tipped forward/down
}

function onOrientationFallback(e) {
  if (useAbsoluteOrientation) return; // already handled by absolute event
  if (e.webkitCompassHeading != null) {
    // iOS: webkitCompassHeading is a direct true-north bearing 0–360
    heading = e.webkitCompassHeading;
  } else if (e.absolute && e.alpha != null) {
    heading = (360 - e.alpha) % 360;
  }
  // (non-absolute Android without webkitCompassHeading is unreliable; skip alpha)
  if (e.beta != null) pitch = e.beta - 90;
}

// ── Render loop ────────────────────────────────────────────────────────────
function renderLoop() {
  rafId = requestAnimationFrame(renderLoop);
  if (!userPos) return;

  const W = window.innerWidth;
  const H = window.innerHeight;

  document.getElementById('hud-compass').textContent = `↑ ${Math.round(heading)}°`;

  stations.forEach(s => {
    const marker  = document.getElementById(`m-${s.id}`);
    const distEl  = document.getElementById(`md-${s.id}`);
    if (!marker) return;

    const bearing = getBearing(userPos, s);
    const dist    = getDistance(userPos, s);

    // Horizontal: angle between target bearing and device heading (−180 to +180)
    const relH = ((bearing - heading + 540) % 360) - 180;

    // Vertical: ground-level elevation angle (negative = below horizon)
    // For targets far away elevation ≈ 0; nearby targets are slightly below horizon
    // We assume target is at roughly the same elevation as the user.
    const elevAngle = dist > 5 ? -toDeg(Math.atan(1.5 / dist)) : -8;
    // relV: positive = above camera center → lower yPct
    const relV = elevAngle + pitch; // pitch > 0 = looking down → horizon moves up

    const xPct = 50 + (relH / (HFOV / 2)) * 50;
    const yPct = 50 - (relV / (VFOV / 2)) * 50;

    const inView = Math.abs(relH) < HFOV / 2;

    if (inView) {
      marker.style.display = 'flex';
      marker.style.left    = `${xPct}%`;
      marker.style.top     = `${Math.max(8, Math.min(88, yPct))}%`;
      distEl.textContent   = fmtDist(dist);
    } else {
      marker.style.display = 'none';
    }

    // Edge indicator (arrow pointing left or right toward off-screen target)
    const edgeId = `edge-${s.id}`;
    let edgeEl = document.getElementById(edgeId);
    if (!inView) {
      if (!edgeEl) {
        edgeEl = document.createElement('div');
        edgeEl.id = edgeId;
        edgeEl.className = 'edge-indicator ' + (relH < 0 ? 'edge-left' : 'edge-right');
        edgeEl.textContent = relH < 0 ? '‹' : '›';
        document.getElementById('overlay').appendChild(edgeEl);
      }
      edgeEl.style.display = 'block';
      edgeEl.className = 'edge-indicator ' + (relH < 0 ? 'edge-left' : 'edge-right');
      edgeEl.textContent = relH < 0 ? '‹' : '›';
    } else {
      if (edgeEl) edgeEl.style.display = 'none';
    }
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
renderList();
</script>
</body>
</html>
